name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.9.0-beta.1 && git push origin v0.9.0-beta.1
# Tags containing a hyphen (e.g. -beta.1, -rc.1) are published as pre-releases.
# ZydecoDB is Unix-only (the engine uses unix file APIs), so there is no Windows
# target by design.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create (once) the GitHub Release the matrix uploads assets to. Marking it a
  # pre-release for hyphenated tags keeps beta/rc builds out of "latest".
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create (pre)release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          flag=""
          case "$tag" in *-*) flag="--prerelease" ;; esac
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --generate-notes $flag
          fi

  upload:
    needs: create-release
    permissions:
      contents: write       # upload release assets
      id-token: write       # sign the provenance attestation
      attestations: write   # write the provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the static/release binary (cross-compiling via `cross` when the
      # target isn't the host), archives it with LICENSE + README + example
      # config, writes a .sha256 sidecar, and uploads everything to the release.
      - name: Build, archive, checksum, upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: zydecodb
          target: ${{ matrix.target }}
          archive: zydecodb-$tag-$target
          checksum: sha256
          include: LICENSE,README.md,config/zydecodb.example.toml
          token: ${{ secrets.GITHUB_TOKEN }}
      # Cryptographic proof the artifact was built by this workflow (not a
      # laptop). Downloaders can verify with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "zydecodb-*-${{ matrix.target }}.tar.gz"

  # Publish the Python driver to PyPI on the same tag. Uses PyPI trusted
  # publishing (OIDC) — configure this repo + workflow as a trusted publisher
  # for the `zydecodb` project on PyPI; no long-lived token needed.
  publish-python:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Verify package version matches the tag
        working-directory: clients/python
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # PEP 440: v0.9.0-beta.1 -> 0.9.0b1, -rc.1 -> rc1, -alpha.1 -> a1
          expected="$(echo "$tag" | sed -e 's/-alpha\./a/' -e 's/-beta\./b/' -e 's/-rc\./rc/')"
          actual="$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)"
          if [ "$expected" != "$actual" ]; then
            echo "pyproject.toml version '$actual' != tag-derived '$expected' — bump it before tagging"
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist

  # Publish the TypeScript/Node driver to npm on the same tag. Requires an
  # `NPM_TOKEN` repo secret (automation token for the `zydecodb` package).
  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify package version matches the tag
        working-directory: clients/typescript
        run: |
          tag="${GITHUB_REF_NAME#v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$actual" ]; then
            echo "package.json version '$actual' != tag '$tag' — bump it before tagging"
            exit 1
          fi
      - name: Install deps and build
        working-directory: clients/typescript
        run: |
          npm ci
          npm run build
      - name: Publish to npm
        working-directory: clients/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          dist_tag="latest"
          case "$tag" in *-*) dist_tag="beta" ;; esac
          npm publish --access public --tag "$dist_tag"
