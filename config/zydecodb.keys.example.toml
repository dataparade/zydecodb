# API keys for ZydecoDB. Generate secrets with the admin CLI — never edit hashes by hand.
#
#   zydecodb admin keys create --id backend --role read_write --keys-file keys.toml
#
# Point security.keys_file in zydecodb.toml at this file.

[[key]]
id = "backend"
# Placeholder — replace by running admin keys create
secret_hash = "$argon2id$v=19$m=19456,t=2,p=1$PLACEHOLDER$PLACEHOLDER"
# Written automatically by `admin keys create`: sha256(secret) used as an O(1)
# index into the keystore (the argon2 hash above remains the credential).
# Keys minted before this field existed still verify via a slow linear scan;
# reissue them to get the fast path.
# secret_lookup = "..."
role = "read_write"
tenant = "00000000000000000000000000000000"
allowed_prefixes = []

# Read-only analytics key scoped to event keys:
# [[key]]
# id = "analytics"
