# Local development — no root required.
listen = "127.0.0.1:9470"
data_dir = "/tmp/zydecodb/data"
wal_dir = "/tmp/zydecodb/wal"
block_cache_mb = 64
max_open_readers = 32
poll_compaction_ms = 50
durability = "sync"

# Local Prometheus/health endpoint for poking at /metrics during dev.
[metrics]
listen = "127.0.0.1:9471"

[security]
require_auth = "false"
keys_file = "/tmp/zdb/keys.toml"
allow_unauthenticated_ping = true
legacy_single_tenant = true

[security.audit]
enabled = true
log_client_key = false

[tls]
enabled = false
